<!DOCTYPE html>
<html>
<head>
<title>Payment - Sri Online Mart</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;background:#f1f3f6;margin:0;}

.header{
background:#2874f0;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
max-width:500px;
margin:auto;
background:white;
margin-top:20px;
padding:20px;
border-radius:8px;
}

input, select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#fb641b;
color:white;
border:none;
padding:12px;
width:100%;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

button:hover{background:#e55300;}

.total{
font-size:20px;
color:green;
font-weight:bold;
}

/* Hide sections */
.pay-box{display:none;}
</style>

</head>

<body>

<div class="header">Payment</div>

<div class="container">

<h2>Customer Details</h2>
<input type="text" id="name" placeholder="Full Name">
<input type="text" id="phone" placeholder="Mobile Number">
<input type="text" id="address" placeholder="Address">


<h2>Select Payment Method</h2>

<select id="method" onchange="showMethod()">
<option value="">-- Select --</option>
<option value="upi">UPI</option>
<option value="card">Credit/Debit Card</option>
<option value="netbanking">Net Banking</option>
<option value="cod">Cash on Delivery</option>
</select>

<!-- UPI -->
<div id="upi" class="pay-box">
<input type="text" placeholder="Enter UPI ID">
<input type="password" placeholder="Enter UPI PIN">
</div>

<!-- CARD -->
<div id="card" class="pay-box">
<input type="text" placeholder="Card Number">
<input type="text" placeholder="Expiry Date">
<input type="password" placeholder="CVV">
</div>

<!-- NET BANKING -->
<div id="netbanking" class="pay-box">
<input type="text" placeholder="Bank Name">
<input type="text" placeholder="User ID">
<input type="password" placeholder="Password">
</div>

<!-- COD -->
<div id="cod" class="pay-box">
<p>Pay when product is delivered</p>
</div>

<button onclick="payNow()">Pay Now</button>

</div>

<script>

// ✅ GET TOTAL FROM ORDER PAGE
const params = new URLSearchParams(window.location.search);
let total = params.get("total") || 0;
document.getElementById("total").innerText = total;


// ✅ SHOW PAYMENT OPTION BOX
function showMethod(){
let method = document.getElementById("method").value;

// hide all
document.querySelectorAll(".pay-box").forEach(box => box.style.display="none");

// show selected
if(method){
document.getElementById(method).style.display="block";
}
}


// ✅ FINAL PAYMENT
function payNow(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let address = document.getElementById("address").value;
let method = document.getElementById("method").value;

if(name=="" || phone=="" || address==""){
alert("Fill customer details");
return;
}

if(method==""){
alert("Select payment method");
return;
}

// SAVE ALL DATA
localStorage.setItem("name", name);
localStorage.setItem("phone", phone);
localStorage.setItem("address", address);
localStorage.setItem("method", method);
localStorage.setItem("total", total);

// GO TO SUCCESS PAGE
window.location.href="success.html";
}

</script>

</body>
</html>
