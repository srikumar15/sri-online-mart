<!DOCTYPE html>
<html>
<head>
<title>Order Success</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- PDF Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family:Arial;
background:#f1f3f6;
text-align:center;
padding:30px;
}

.box{
background:white;
padding:20px;
max-width:400px;
margin:auto;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h1{
color:green;
}

p{
font-size:16px;
margin:10px 0;
}
</style>

</head>

<body>

<div class="box">

<h1>✅ Payment Successful</h1>

<h2>Sri Online Mart</h2>

<p id="name"></p>
<p id="phone"></p>
<p id="address"></p>

</div>

<script>
const { jsPDF } = window.jspdf;

// GET DATA
let customer = JSON.parse(localStorage.getItem("customerDetails"));

if(customer){
document.getElementById("name").innerText = "Name: " + customer.name;
document.getElementById("phone").innerText = "Mobile: " + customer.phone;
document.getElementById("address").innerText = "Address: " + customer.address;
}else{
alert("ordered confirmed");
}

// AUTO DOWNLOAD PDF
window.onload = function(){

if(!customer) return;

let doc = new jsPDF();

// Title
doc.setFontSize(18);
doc.text("Sri Online Mart", 20, 20);

doc.setFontSize(14);
doc.text("Payment Successful", 20, 35);

// Box style text
doc.setFontSize(12);
doc.text("Customer Details:", 20, 55);

doc.text("Name: " + customer.name, 20, 70);
doc.text("Mobile: " + customer.phone, 20, 80);
doc.text("Address: " + customer.address, 20, 90);

// Footer
doc.text("Thank you for your order!", 20, 110);

// AUTO DOWNLOAD
doc.save("Order_Success.pdf");

};
</script>

</body>
</html>
